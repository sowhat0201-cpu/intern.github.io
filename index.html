<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場實習生類型測驗</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --info: #3182ce; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-progress { font-size: 14px; color: #95a5a6; margin-bottom: 10px; text-align: center; }
        .btn-opt { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; background: white; border-radius: 10px; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .btn-opt:hover { background: #f0f7ff; border-color: var(--accent); }
        #result-area { display: none; }
        .type-title { text-align: center; font-size: 26px; color: var(--accent); font-weight: bold; margin: 15px 0; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .card { padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 15px; line-height: 1.5; }
        .card-light { background: #f0fff4; border-left: 5px solid var(--success); }
        .card-shadow { background: #fff5f5; border-left: 5px solid var(--danger); }
        .card-advice { background: #ebf8ff; border: 1px dashed var(--info); }
        .card-label { font-weight: bold; margin-bottom: 5px; font-size: 17px; display: block; }
        .footer-msg { text-align: center; font-size: 12px; color: #bdc3c7; margin-top: 20px; }
        .restart-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h2 style="text-align:center;">🔍 職場實習生類型測驗</h2>
        <div id="q-content"></div>
    </div>

    <div id="result-area">
        <div class="type-title" id="res-name"></div>
        <div class="card card-light"><span class="card-label">✨ 正向光芒</span><span id="res-light"></span></div>
        <div class="card card-shadow"><span class="card-label">⚠️ 可能困擾</span><span id="res-shadow"></span></div>
        <div class="card card-advice"><span class="card-label">💡 進化修煉建議</span><span id="res-advice"></span></div>
        <p class="footer-msg" id="status">數據處理中...</p>
        <button class="restart-btn" onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
    // --- 重要：請置換下方網址 ---
    const GOOGLE_URL = '
https://script.google.com/macros/s/AKfycbxa4bHsIL4rrJ2t-XE5FQbpM1jVcP2v9Ijbltz8zQXZkAdTdPiWHl0cDuC1Z4kmqdJSMg/exec';

    const quiz = [
        { q: "實習第一天報到，面對全新環境與同事，你會？", a: "觀察職稱與座位建立架構圖", b: "微笑打招呼記住大家名字", c: "思考辦公室動線哪裡可以更酷", d: "安靜待在位子等待指令" },
        { q: "拿到厚厚一疊「實習生須知」，你的閱讀習慣是？", a: "直接看最後的考核標準", b: "先看福利與員工聚餐部分", c: "隨意翻閱希望有圖解版", d: "從第一頁開始認真劃重點" },
        { q: "主管正在教導複雜的操作流程，你通常會？", a: "邊聽邊思考有沒有省時捷徑", b: "觀察主管表情表現出受教樣子", c: "想試試看不用手冊能不能成功", d: "拿出筆記本詳細記錄動作" },
        { q: "午高峰現場混亂且每個人口氣不好，你會？", a: "進入自動模式精準完成任務", b: "壓力很大擔心大家在生我的氣", c: "覺得刺激想跳出來指揮大家", d: "更加小心翼翼深怕犯錯被罵" },
        { q: "打翻了重要食材或文件，你的反應是？", a: "立刻計算損失與時間並通報", b: "非常愧疚一直跟身邊人道歉", c: "腦袋想著創意方式掩蓋或補救", d: "愣住一秒後默默開始清理" },
        { q: "對於「重複做一樣的事」，你的看法是？", a: "享受效率變快的極致感", b: "能跟同事聊天就沒關係", c: "想辦法自動化它否則很折磨", d: "很有安全感喜歡知道要做什麼" },
        { q: "發現學長姐流程有誤，你會？", a: "拿數據證據私下提醒他", b: "委婉詢問：這樣做會更好嗎？", c: "在心裡笑他改用新方法做給他看", d: "覺得他是前輩照做就好" },
        { q: "大家在抱怨主管很兇，你會？", a: "冷靜分析主管兇的背後邏輯", b: "帶頭安慰受挫同事提供情緒價值", c: "講主管笑話化解氣氛", d: "默默聽著不發表意見怕被傳出去" },
        { q: "主管突然交辦沒學過的任務且明天要交？", a: "通宵查資料把它做出來", b: "找關係好的同事求助帶我做", c: "興奮終於不用做無聊的事了", d: "焦慮希望能有詳細範本參考" },
        { q: "你最喜歡的主管類型是？", a: "講求邏輯、不講廢話", b: "親切理解我感受的主管", c: "給我很大發揮空間不愛管細節", d: "指令清晰讓我很有安全感" },
        { q: "在團隊中你覺得自己最像？", a: "大腦（分析決策）", b: "心臟（聯繫感情）", c: "手腳（行動實驗）", d: "脊椎（穩定支撐）" },
        { q: "工作出錯需要「扛責」時，你的態度是？", a: "絕對負責並提交改進報告", b: "因為拖累大家而難過很久", c: "解釋動機希望大家看重初衷", d: "認錯接受處分後更加謹慎" },
        { q: "對於職場中的「社交應酬」看法？", a: "除非對升遷有助否則浪費時間", b: "非常重要是建立默契時刻", c: "喜歡有趣討厭死板應酬", d: "覺得累只想趕快回家休息" },
        { q: "主管稱讚你做得好，內心獨白是？", a: "正常發揮，我確實比別人有效率", b: "主管終於認可我了要更努力", c: "下次試更瘋狂做法讓他驚訝", d: "鬆口氣不用擔心表現不好了" },
        { q: "創意被主管當眾否決時？", a: "詢問理由回家優化再提", b: "覺得受挫是否我這個人有問題", c: "覺得主管沒眼光默默給他扣分", d: "喔好那我就照舊方法做" },
        { q: "發現還有很多技能沒學會，你會？", a: "整理清單找主管前輩請教", b: "結交到的朋友比技能更重要", c: "打算回家自己實驗不被限制", d: "遺憾但不敢主動要求學習" },
        { q: "在忙碌環境中，最受不了哪種同事？", a: "慢吞吞還一直出錯的人", b: "口氣差不顧別人感受的人", c: "墨守成規一點彈性都沒有的人", d: "喜怒無常指令變來變去的人" },
        { q: "發現公司有潛在巨大危機？", a: "提出數據化解決方案", b: "跟信任同事商量看大家想法", c: "覺得是改變現狀機會想試奇招", d: "告訴直屬主管聽從指示" },
        { q: "職場情緒管理最難的是？", a: "面對蠢問題保持專業", b: "面對衝突保持微笑", c: "面對無聊保持熱情", d: "面對壓力保持清醒" },
        { q: "結束實習當天，希望留下的印象？", a: "專業且高產能的人才", b: "溫暖好相處貼心的夥伴", c: "思維跳躍有潛力的新星", d: "認真負責穩定的基石" }
    ];

    let scores = { a:0, b:0, c:0, d:0 }, step = 0;

    function render() {
        if (step >= quiz.length) { showResult(); return; }
        const item = quiz[step];
        document.getElementById('q-content').innerHTML = `
            <div class="q-progress">進度：${step + 1} / ${quiz.length}</div>
            <p><strong>${item.q}</strong></p>
            <button class="btn-opt" onclick="tap('a')">(A) ${item.a}</button>
            <button class="btn-opt" onclick="tap('b')">(B) ${item.b}</button>
            <button class="btn-opt" onclick="tap('c')">(C) ${item.c}</button>
            <button class="btn-opt" onclick="tap('d')">(D) ${item.d}</button>`;
    }

    function tap(c) { scores[c]++; step++; render(); }

    function showResult() {
        // 強制切換畫面
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        const top = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        let res = { name:"", light:"", shadow:"", advice:"" };

        if (top === 'a') {
            res.name = "精準高效的領航員";
            res.light = "追求卓越與效率，是單位中極具戰鬥力的可靠夥伴。";
            res.shadow = "容易忽略同事感受，過度要求效率可能讓團隊壓力巨大。";
            res.advice = "學習在溝通中加入一點溫度，理解「人」的因素也是效率的一部分。";
        } else if (top === 'b') {
            res.name = "溫暖感性的潤滑劑";
            res.light = "共感力強，能觀察情緒並緩解緊繃氣氛，是大家的支柱。";
            res.shadow = "難以拒絕他人或不敢指出錯誤，容易為了和諧而犧牲進度。";
            res.advice = "練習明確的界線與回饋，好的回饋是為了幫助夥伴成長。";
        } else if (top === 'c') {
            res.name = "靈感爆棚的開拓者";
            res.light = "富有創意且敢於挑戰，能為僵化流程帶來新氣象。";
            res.shadow = "三分鐘熱度，常丟出新點子卻不負責執行落地的收尾工作。";
            res.advice = "練習完整執行一個點子直到成功，這能建立你在職場的信用感。";
        } else {
            res.name = "踏實穩定的守護者";
            res.light = "沉穩耐操，對交辦事務極度負責，是單位最穩定的基石。";
            res.shadow = "應變力較弱，習慣等待指令，容易在變動中感到慌張。";
            res.advice = "嘗試主動回報進度，並練習在心中模擬可能的突發狀況。";
        }

        document.getElementById('res-name').innerText = res.name;
        document.getElementById('res-light').innerText = res.light;
        document.getElementById('res-shadow').innerText = res.shadow;
        document.getElementById('res-advice').innerText = res.advice;

        // 背景傳送 (不等待結果)
        if(GOOGLE_URL && GOOGLE_URL.includes('https')) {
            fetch(GOOGLE_URL, { method:'POST', mode:'no-cors', body:'result=' + encodeURIComponent(res.name), headers:{'Content-Type':'application/x-www-form-urlencoded'} })
            .then(() => document.getElementById('status').innerText = "數據已回傳至系統")
            .catch(() => document.getElementById('status').innerText = "上傳失敗，但結果如上所示");
        }
    }
    render();
</script>
</body>
</html>
